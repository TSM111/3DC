<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3DN</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="3dn.png">
</head>
<body>
    <div class="centered">
        <a href="index.html" class="menu">Menu</a>
        <a href="creator.html" class="menu">Creator</a>
    </div>
    <br>
    <button id="run" class="left">></button>
    <button id="STOP" class="left">x</button>
    <br>
    <canvas id="ddd" width="400" height="400"></canvas>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    
    <div class="left">
        <textarea class="left1" placeholder="Put Your code here..." id="code" rows="10" cols="50"></textarea>
    </div>
    <br>
    <div class="left">
        <input type="file" id="file" class="left"><button id="upbtm" class="left">load</button>
        <button id="downloadBtm" class="left">Save Text as File</button>
    </div>

    <script>
        $("#upbtm").click(function(){
            const fi = $('#file')[0];
            const file = fi.files[0];
            const reader = new FileReader();
            reader.onload = function(event){
                const cont = event.target.result;
                $('#code').val(cont);
            }
            reader.readAsText(file);
        });

        $("#downloadBtm").click(function(){
            const t = $("#code").val();
            const blob = new Blob([t],{ type: 'text/plain' });
            const du = window.URL.createObjectURL(blob);
            $('<a>', { href: du, download: 'code.txt' }).appendTo('body').get(0).click();
            window.URL.revokeObjectURL(du);
            $('a[href="' + du + '"]').remove();
        });
    </script>

    <p id="keyt">None</p>

    <script>
        const canvas = document.getElementById("ddd");
        const d = canvas.getContext("2d");
        
        var r = "";
        var cx = 0, cy = 0, cz = 1;
        var ry = 0, rx = 0;
        var fl = -300;
        var z_sorting = [];

        // Global variables for calculations inside functions
        var px = 0, py = 0, pz = 0;

        // Mathematical point transformation function
        var setpnts = function(x, y, z){
            px = (Math.cos(rx) * (x - cx)) + (Math.sin(rx) * (z - cz));
            py = (Math.cos(ry) * (y - cy)) + (Math.sin(ry) * ((Math.sin(rx) * (x - cx)) - (Math.cos(rx) * (z - cz))));
            pz = (Math.sin(ry) * (y - cy)) - (Math.cos(ry) * ((Math.sin(rx) * (x - cx)) - (Math.cos(rx) * (z - cz))));
            px = px - 3;
        };

        // Returns screen coordinates and depth data safely without issuing canvas commands immediately
        var getProjectedPoint = function(x, y, z) {
            setpnts(x, y, z);
            return {
                x: ((px + 3) / pz) * (fl * -1) + 200,
                y: (py / pz) * fl + 200,
                zDepth: pz
            };
        };

        // Internal engine processor handling individual face depth 
        var pushFace = function(points, color) {
            let projected = [];
            let sumZ = 0;
            let completelyBehindCamera = true;

            for (let i = 0; i < points.length; i++) {
                let p = getProjectedPoint(points[i].x, points[i].y, points[i].z);
                projected.push(p);
                sumZ += p.zDepth;
                if (p.zDepth > 0.3) {
                    completelyBehindCamera = false;
                }
            }

            // Reject geometry sitting completely behind viewport clip boundary
            if (completelyBehindCamera) return;

            // Calculate precise mathematical average depth of this face
            let averageDepth = sumZ / points.length;

            z_sorting.push({
                depth: averageDepth,
                draw: function() {
                    d.lineWidth = 2; // Reduced line width to prevent face bleed
                    d.strokeStyle = "black";
                    d.fillStyle = color;
                    
                    d.beginPath();
                    d.moveTo(projected[0].x, projected[0].y);
                    for (let i = 1; i < projected.length; i++) {
                        d.lineTo(projected[i].x, projected[i].y);
                    }
                    d.closePath();
                    d.fill();
                    d.stroke();
                }
            });
        };

        // Global API exposed to the user code environment inside the textarea
        var cube = function(x, y, z, sx, sy, sz, c){
            let hx = sx / 2;
            let hy = sy / 2;
            let hz = sz / 2;

            // Define coordinates for all 8 base corners
            let c1 = {x: x + hx, y: y + hy, z: z - hz};
            let c2 = {x: x + hx, y: y + hy, z: z + hz};
            let c3 = {x: x - hx, y: y + hy, z: z + hz};
            let c4 = {x: x - hx, y: y + hy, z: z - hz};
            let c5 = {x: x + hx, y: y - hy, z: z - hz};
            let c6 = {x: x + hx, y: y - hy, z: z + hz};
            let c7 = {x: x - hx, y: y - hy, z: z + hz};
            let c8 = {x: x - hx, y: y - hy, z: z - hz};

            // Break down the single cube payload into 6 separate sortable render faces
            pushFace([c1, c2, c3, c4], c); // Top
            pushFace([c5, i2=c6, c7, c8], c); // Bottom
            pushFace([c4, c1, c5, c8], c); // Front
            pushFace([c3, c2, c6, c7], c); // Back
            pushFace([c4, c3, c7, c8], c); // Left
            pushFace([c1, c2, c6, c5], c); // Right
        };

        // Core Engine Loop
        setInterval(() =>{
            // Re-draw background scene canvas clear
            d.fillStyle = "blue";
            d.fillRect(0, 0, 400, 400);

            // Execute custom text script geometry calculations
            try {
                eval(r);
            } catch(e) {}

            // Core Sorting Fix: Sort faces strictly from furthest away to closest
            z_sorting.sort((a, b) => b.depth - a.depth);

            // Render array in correct structural order
            for(var i = 0; i < z_sorting.length; i++) {
                z_sorting[i].draw();
            }

            // Cleanup queue payload completely for next frame update
            z_sorting = [];

            // Draw outer layout frames overlay securely 
            d.strokeStyle = "black";
            d.lineWidth = 10;
            d.strokeRect(0, 0, 400, 400);
        }, 60);
    </script>

    <script>
        $(document).keydown(function(event) {
            if(event.key==="ArrowLeft"){ rx+=0.1 }
            if(event.key==="ArrowUp"){ ry+=0.1 }
            if(event.key==="ArrowDown"){ ry-=0.1 }
            if(event.key==="ArrowRight"){ rx-=0.1 }
            if(event.key==="w"){ cx+=Math.sin(rx)*-0.5; cz+=Math.cos(rx)*0.5; }
            if(event.key==="s"){ cx+=Math.sin(rx)*0.5; cz+=Math.cos(rx)*-0.5; }
            if(event.key==="a"){ cx+=Math.cos(rx)*-0.5; cz+=Math.sin(rx)*-0.5; }
            if(event.key==="d"){ cx+=Math.cos(rx)*0.5; cz+=Math.sin(rx)*0.5; }
            $("#keyt").text(event.key);
        });
    </script>

    <script>
        $("#run").click(function(event) {
            try {
                let inputCode = $("#code").val();
                r = inputCode.replace(/alert\(.*?\);?/g, "");
            } catch (error) {
                alert("Error: " + error.message);
            }
        });
        $("#STOP").click(function(event) {
            r = "";
        });
    </script>
</body>
</html>
